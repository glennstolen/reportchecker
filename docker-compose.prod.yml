services:
  db:
    image: postgres:16-alpine
    container_name: reportchecker-db
    environment:
      POSTGRES_USER: reportchecker
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: reportchecker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - reportchecker-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reportchecker"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: reportchecker-redis
    volumes:
      - redis_data:/data
    networks:
      - reportchecker-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: reportchecker-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    networks:
      - reportchecker-net
    restart: unless-stopped

  backend:
    image: ghcr.io/glennstolen/reportchecker/backend:latest
    container_name: reportchecker-backend
    environment:
      DATABASE_URL: postgresql://reportchecker:${POSTGRES_PASSWORD}@db:5432/reportchecker
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: reports
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      APP_URL: http://${DOMAIN}
      SMTP_HOST: ${SMTP_HOST:-smtp-relay.brevo.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - reportchecker-net
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    image: ghcr.io/glennstolen/reportchecker/frontend:latest
    container_name: reportchecker-frontend
    environment:
      NEXT_PUBLIC_API_URL: ""  # Tom = same-origin, Caddy ruter /api/* til backend
    depends_on:
      - backend
    networks:
      - reportchecker-net
    ports:
      - "3000:3000"
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: reportchecker-caddy
    network_mode: host
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  caddy_data:
  caddy_config:

networks: 
  reportchecker-net:
