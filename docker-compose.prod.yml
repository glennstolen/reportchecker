services:
  db:
    image: postgres:16-alpine
    container_name: reportchecker-db
    environment:
      POSTGRES_USER: reportchecker
      POSTGRES_PASSWORD: reportchecker_prod
      POSTGRES_DB: reportchecker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - reportchecker-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reportchecker"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: reportchecker-redis
    volumes:
      - redis_data:/data
    networks:
      - reportchecker-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: reportchecker-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    networks:
      - reportchecker-net

  backend:
    image: ghcr.io/glennstolen/reportchecker/backend:latest
    container_name: reportchecker-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://reportchecker:reportchecker_prod@db:5432/reportchecker
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MINIO_BUCKET: reports
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - reportchecker-net

  frontend:
    image: ghcr.io/glennstolen/reportchecker/frontend:latest
    container_name: reportchecker-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - reportchecker-net

networks:
  reportchecker-net:

volumes:
  postgres_data:
  redis_data:
  minio_data:
