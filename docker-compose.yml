services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: reportchecker-db
    network_mode: host
    environment:
      POSTGRES_USER: reportchecker
      POSTGRES_PASSWORD: reportchecker_dev
      POSTGRES_DB: reportchecker
      PGPORT: "5433"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reportchecker -h 127.0.0.1 -p 5433"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for Celery task queue
  redis:
    image: redis:7-alpine
    container_name: reportchecker-redis
    network_mode: host
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # MinIO for S3-compatible file storage
  minio:
    image: minio/minio:latest
    container_name: reportchecker-minio
    network_mode: host
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend API (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: reportchecker-backend
    network_mode: host
    environment:
      DATABASE_URL: postgresql://reportchecker:reportchecker_dev@127.0.0.1:5433/reportchecker
      REDIS_URL: redis://127.0.0.1:6379/0
      MINIO_ENDPOINT: 127.0.0.1:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MINIO_BUCKET: reports
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
      REQUESTS_CA_BUNDLE: /etc/ssl/certs/ca-certificates.crt
      HTTPX_SSL_CERT_FILE: /etc/ssl/certs/ca-certificates.crt
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Celery worker for async tasks
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: reportchecker-worker
    network_mode: host
    environment:
      DATABASE_URL: postgresql://reportchecker:reportchecker_dev@127.0.0.1:5433/reportchecker
      REDIS_URL: redis://127.0.0.1:6379/0
      MINIO_ENDPOINT: 127.0.0.1:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MINIO_BUCKET: reports
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A workers.celery_app worker --loglevel=info

volumes:
  postgres_data:
  redis_data:
  minio_data:
