name: Build and Release

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository }}/backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository }}/frontend

jobs:
  build-images:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version tag
        id: meta
        run: echo "version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ steps.meta.outputs.version }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ steps.meta.outputs.version }}

  build-installer:
    name: Build Windows installer
    runs-on: windows-latest
    needs: build-images
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build installer with Inno Setup
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.4
        with:
          path: installer/reportchecker.iss
          options: /O"installer/output"

      - name: Upload installer as release asset
        uses: softprops/action-gh-release@v2
        with:
          files: installer/output/ReportChecker-Setup.exe
          body: |
            ## Installasjon

            1. Last ned `ReportChecker-Setup.exe`
            2. Installer [Docker Desktop](https://www.docker.com/products/docker-desktop/) hvis det ikke allerede er installert, og start det
            3. Kjør `ReportChecker-Setup.exe` og følg veiviseren
            4. Oppgi din [Anthropic API-nøkkel](https://console.anthropic.com/) når du blir bedt om det
            5. Klikk "Start ReportChecker" på skrivebordet

            **NB:** Første oppstart tar noen minutter mens Docker laster ned nødvendige komponenter.
